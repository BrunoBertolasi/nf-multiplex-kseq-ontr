# Primer Design Configuration for Multiplex K-seq ONT

# Target regions (requires annotation)
target_regions:
  enabled: false        # Set to true if using annotation
  types:
    - "intron"          # Options: intron, exon, intergenic, CDS, UTR
  strict_mode: true     # Reject primers that bind outside target regions

# Amplicon parameters
amplicon:
  min_size: 250         # Minimum amplicon size (bp)
  max_size: 450         # Maximum amplicon size (bp)
  target_size: 350      # Optimal amplicon size (bp)
  pcr_extension_time: 25  # Extension time in seconds (KEY FEATURE!)
  polymerase: "Q5"      # Q5 (15-30 sec/kb) or Taq (60 sec/kb)

# Primer parameters
primer:
  length: 18            # Primer length (bp)
  min_length: 16
  max_length: 20
  gc_content:
    min: 40             # Minimum GC% (40%)
    max: 60             # Maximum GC% (60%)
  tm:
    min: 55             # Minimum melting temperature (°C)
    max: 65             # Maximum melting temperature (°C)
    optimal: 60         # Optimal Tm (°C)
  max_homopolymer: 4    # Max consecutive identical bases

# Binding site parameters
binding_sites:
  min_count: 100        # Minimum binding sites per primer
  max_count: 1000       # Maximum binding sites per primer
  optimal_count: 500    # Optimal binding sites
  max_mismatches: 1     # Allow 1 mismatch when counting sites

# Multiplex compatibility
multiplex:
  target_pairs: 20      # Target number of primer pairs
  min_pairs: 15         # Minimum acceptable pairs
  max_pairs: 50         # Maximum pairs to consider
  max_3prime_complementarity: 2   # Max 3' end matches (dimer prevention)
  max_internal_complementarity: 6 # Max internal matches

# Linkage disequilibrium optimization
ld_optimization:
  enabled: true
  min_contig_distance: 10000      # Min distance between amplicons on same contig (bp)
  prefer_different_contigs: true  # Prefer amplicons on different contigs

# Output parameters
output:
  report_all_sets: true     # Report ALL compatible sets (not just top N)
  include_validation: true  # Include in silico validation
  
  # SNP density defaults (SNPs per kb) - auto-selected by region type
  snp_density:
    intron: 15.0        # Higher in introns (less conserved)
    exon: 8.0           # Lower in exons (conserved)
    intergenic: 18.0    # Highest in intergenic regions
    CDS: 7.0            # Lowest in coding sequences
    UTR: 12.0           # Moderate in UTRs
    default: 12.9       # Genome-wide average (used if no annotation)
    custom: null        # User override (set value here to override auto-detection)
  
  expected_snps:
    min_snps: 20000     # Minimum SNPs required
    target_snps: 50000  # Target SNPs
